<!DOCTYPE html><html><head><meta charset='utf-8'><link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Space+Grotesk:wght@500;700&display=swap" as="style" onload="this.onload=null;this.rel=&#39;stylesheet&#39;"><style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;overflow:hidden;background:#0d3b3e;}
.card{width:1080px;height:1920px;background:linear-gradient(150deg,#0d3b3e,#114e51);
  position:relative;overflow:hidden;color:#fff;display:flex;flex-direction:column;
  justify-content:space-between;padding:106px 88px;}
.glow{position:absolute;border-radius:50%;}
.g1{width:760px;height:760px;top:-280px;right:-220px;background:rgba(255,196,102,.10);}
.g2{width:520px;height:520px;bottom:-220px;left:-200px;background:rgba(255,196,102,.05);}
.row{display:flex;justify-content:space-between;align-items:center;z-index:2;}
.mk{font-family:'Inter';font-weight:900;font-size:58px;letter-spacing:-3px;color:#fff;}
.mk .iq{color:#ffc466;}
.date{font-family:'Space Grotesk';font-weight:700;font-size:36px;letter-spacing:5px;color:rgba(255,255,255,.55);text-transform:uppercase;}
.body{z-index:2;}
.num{font-family:'Inter';font-weight:900;font-size:240px;line-height:.9;letter-spacing:-10px;opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease;}
.up{color:#5fcb97;} .down{color:#e8806a;}
.head{font-family:'Inter';font-weight:900;font-size:90px;line-height:1.02;letter-spacing:-3px;color:#fff;margin-top:14px;opacity:0;transform:translateY(16px);transition:opacity .5s ease .08s,transform .5s ease .08s;}
.stripe{width:200px;height:22px;background:#ffc466;margin:44px 0;transform:scaleX(0);transform-origin:left;transition:transform .45s ease .18s;}
.why{font-family:'Space Grotesk';font-weight:500;font-size:54px;line-height:1.5;color:rgba(244,239,227,.92);min-height:560px;}
.w{display:inline-block;opacity:0;transform:translateY(14px);transition:opacity .48s cubic-bezier(.2,.7,.2,1),transform .48s cubic-bezier(.2,.7,.2,1);}
.w.on{opacity:1;transform:translateY(0);}
.lead .num,.lead .head{opacity:1;transform:translateY(0);}
.lead .stripe{transform:scaleX(1);}
.foot{font-family:'Space Grotesk';font-weight:600;font-size:38px;letter-spacing:6px;color:rgba(255,255,255,.45);text-transform:uppercase;z-index:2;}
.cover{justify-content:center;align-items:center;text-align:center;}
.label,.big,.sub{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.head-on .label{transition-delay:0s;} .head-on .big{transition-delay:.12s;} .head-on .sub{transition-delay:.28s;}
.cover.head-on .label,.cover.head-on .big,.cover.head-on .sub{opacity:1;transform:translateY(0);}
.label{font-family:'Space Grotesk';font-weight:700;font-size:40px;letter-spacing:14px;color:rgba(255,196,102,.85);text-transform:uppercase;}
.big{font-family:'Inter';font-weight:900;font-size:140px;line-height:1.0;letter-spacing:-5px;color:#fff;}
.sub{font-family:'Space Grotesk';font-weight:500;font-size:50px;line-height:1.45;color:rgba(244,239,227,.72);max-width:800px;}
.fixed-top{position:absolute;top:106px;left:88px;right:88px;}
</style>
<script>
function startFact(leadMs, perMs){
  const card = document.querySelector('.card');
  setTimeout(()=>card.classList.add('lead'), 60);   // number+headline+stripe ease in
  const ws = document.querySelectorAll('.w');
  ws.forEach((w,i)=> setTimeout(()=> w.classList.add('on'), leadMs + i*perMs));
}
function startCover(){ const c=document.querySelector('.card'); setTimeout(()=>c.classList.add('head-on'), 80); }
</script>
</head><body onload="document.fonts.ready.then(()=>startFact(550,356))"><div class='card'><div class='glow g1'></div><div class='glow g2'></div><div class='row'><div class='mk'>toro<span class='iq'>IQ</span></div><div class='date'>5 Jun</div></div><div class='body'><div class='num down'>−3%</div><div class='head'>Oil fell.<br>Stocks didn't.</div><div class='stripe'></div><div class='why'><span class='w'>India</span> <span class='w'>imports</span> <span class='w'>most</span> <span class='w'>of</span> <span class='w'>its</span> <span class='w'>oil,</span> <span class='w'>so</span> <span class='w'>cheaper</span> <span class='w'>oil</span> <span class='w'>usually</span> <span class='w'>helps.</span> <span class='w'>But</span> <span class='w'>fighting</span> <span class='w'>near</span> <span class='w'>the</span> <span class='w'>Strait</span> <span class='w'>of</span> <span class='w'>Hormuz</span> <span class='w'>could</span> <span class='w'>send</span> <span class='w'>prices</span> <span class='w'>back</span> <span class='w'>up.</span> <span class='w'>So</span> <span class='w'>the</span> <span class='w'>market</span> <span class='w'>didn't</span> <span class='w'>trust</span> <span class='w'>the</span> <span class='w'>drop.</span></div></div><div class='foot'>India Markets Brief</div></div></body></html>
