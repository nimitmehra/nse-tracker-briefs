<!DOCTYPE html><html><head><meta charset='utf-8'><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&family=Space+Grotesk:wght@500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1920px;overflow:hidden;}
.card{width:1080px;height:1920px;background:linear-gradient(150deg,#0d3b3e,#114e51);
  position:relative;overflow:hidden;color:#fff;display:flex;flex-direction:column;
  justify-content:space-between;padding:104px 88px;}
.glow{position:absolute;border-radius:50%;}
.g1{width:760px;height:760px;top:-280px;right:-220px;background:rgba(255,196,102,.10);}
.g2{width:520px;height:520px;bottom:-220px;left:-200px;background:rgba(255,196,102,.05);}
.row{display:flex;justify-content:space-between;align-items:center;z-index:2;}
.mk{font-family:'Inter';font-weight:900;font-size:58px;letter-spacing:-3px;color:#fff;}
.mk .iq{color:#ffc466;}
.date{font-family:'Space Grotesk';font-weight:700;font-size:36px;letter-spacing:5px;color:rgba(255,255,255,.55);text-transform:uppercase;}
.body{z-index:2;}
.num{font-family:'Inter';font-weight:900;font-size:228px;line-height:.9;letter-spacing:-10px;}
.up{color:#5fcb97;} .down{color:#e8806a;}
.head{font-family:'Inter';font-weight:900;font-size:86px;line-height:1.02;letter-spacing:-3px;color:#fff;margin-top:16px;}
.stripe{width:200px;height:22px;background:#ffc466;margin:46px 0;}
.why{font-family:'Space Grotesk';font-weight:500;font-size:50px;line-height:1.52;color:rgba(244,239,227,.9);}
.foot{font-family:'Space Grotesk';font-weight:600;font-size:38px;letter-spacing:6px;color:rgba(255,255,255,.45);text-transform:uppercase;z-index:2;}
.cover{justify-content:center;align-items:center;text-align:center;}
.label{font-family:'Space Grotesk';font-weight:700;font-size:40px;letter-spacing:14px;color:rgba(255,196,102,.85);text-transform:uppercase;}
.big{font-family:'Inter';font-weight:900;font-size:138px;line-height:1.0;letter-spacing:-5px;color:#fff;margin-top:36px;}
.sub{font-family:'Space Grotesk';font-weight:500;font-size:50px;line-height:1.45;color:rgba(244,239,227,.72);margin-top:44px;max-width:800px;}
.fixed-top{position:absolute;top:104px;left:88px;right:88px;}
</style></head><body><div class='card'><div class='glow g1'></div><div class='glow g2'></div><div class='row'><div class='mk'>toro<span class='iq'>IQ</span></div><div class='date'>5 Jun</div></div><div class='body'><div class='num down'>&minus;3%</div><div class='head'>Oil fell.<br>Stocks didn't.</div><div class='stripe'></div><div class='why'>India imports most of its oil, so cheaper oil usually helps. But US&ndash;Iran fighting near the Strait of Hormuz — where most oil ships pass — could send prices back up. So the market didn't trust the drop.</div></div><div class='foot'>India Markets Brief</div></div></body></html>
